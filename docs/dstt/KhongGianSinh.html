<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- MathJax -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

    <script>

            theme: {
                extend: {

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Canvas Container */
        #canvas-container {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%);
            position: relative;
            outline: none;
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .math-block {
            background-color: #fff;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #4F46E5;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .nav-item {
            transition: all 0.2s;
        }
        .nav-item.active {
            background-color: #EEF2FF;
            color: #4F46E5;
            border-right: 3px solid #4F46E5;
            font-weight: 600;
        }
        .nav-item:hover:not(.active) {
            background-color: #F1F5F9;
        }
    </style>
</head>

    </header>

            </div>

    <script>

                ],
                vectors: [
                    { dir: [2, 0, 0], color: 0xef4444, label: "v₁" },
                    { dir: [-1.5, 0, 0], color: 0x3b82f6, label: "v₂" }
                ],
                spanType: "line_2d",
                is3D: false
            },
            {
                id: 2,
                title: "3 Vectơ độc lập trong R³",
                badge: "Span = R³ (Không gian)",
                badgeColor: "bg-purple-100 text-purple-700 border-purple-200",
                desc: "Ba vectơ \( v_1, v_2, v_3 \) không đồng phẳng. Chúng tạo thành một cơ sở cho không gian 3 chiều. Tổ hợp tuyến tính của chúng lấp đầy toàn bộ không gian vô hạn.",
                features: [

                    "Hệ vectơ độc lập tuyến tính.",

                ],
                vectors: [
                    { dir: [2, 0, 0], color: 0xef4444, label: "v₁" },
                    { dir: [0, 2, 0], color: 0x3b82f6, label: "v₂" },
                    { dir: [0, 0, 2], color: 0x10b981, label: "v₃" }
                ],
                spanType: "box_3d",
                is3D: true
            },
            {
                id: 3,
                title: "3 Vectơ đồng phẳng trong R³",
                badge: "Span = Mặt phẳng (trong R³)",
                badgeColor: "bg-emerald-100 text-emerald-700 border-emerald-200",
                desc: "Ba vectơ nằm trên cùng một mặt phẳng (ví dụ mặt phẳng XY) nhưng không cùng phương. Vectơ thứ 3 là tổ hợp của 2 vectơ kia. Không gian sinh là một mặt phẳng 2 chiều nhúng trong không gian 3D.",

                ],
                spanType: "plane_3d",

            {
                id: 4,
                title: "3 Vectơ đồng phương trong R³",

                desc: "Tất cả các vectơ đều nằm trên cùng một đường thẳng đi qua gốc tọa độ. Sự phụ thuộc tuyến tính ở mức độ cao nhất (ngoài vectơ 0).",
                features: [
                    "Tất cả vectơ cùng phương.",
                    "Hệ vectơ phụ thuộc tuyến tính mạnh.",
                    "Không gian sinh chỉ là 1 đường thẳng."
                ],
                vectors: [
                    { dir: [1, 1, 1], color: 0xef4444, label: "v₁" },
                    { dir: [2, 2, 2], color: 0x3b82f6, label: "v₂" },
                    { dir: [-1.5, -1.5, -1.5], color: 0x10b981, label: "v₃" }
                ],
                spanType: "line_3d",
                is3D: true
            },
            {
                id: 5,
                title: "4 Vectơ trong R³ (Dư thừa)",
                badge: "Span = R³ (Nhưng dư vectơ)",
                badgeColor: "bg-indigo-100 text-indigo-700 border-indigo-200",
                desc: "Khi có 4 vectơ trong không gian 3 chiều, chắc chắn chúng phụ thuộc tuyến tính. Tuy nhiên, nếu 3 trong số chúng độc lập, không gian sinh vẫn là toàn bộ R³. Vectơ thứ 4 là 'thừa'.",
                features: [
                    "Số vectơ (4) > Số chiều không gian (3).",
                    "Chắc chắn phụ thuộc tuyến tính.",
                    "Không gian sinh vẫn là R³ (nếu có 3 vectơ độc lập)."
                ],
                vectors: [
                    { dir: [2, 0, 0], color: 0xef4444, label: "v₁" },
                    { dir: [0, 2, 0], color: 0x3b82f6, label: "v₂" },
                    { dir: [0, 0, 2], color: 0x10b981, label: "v₃" },
                    { dir: [1, 1, 1], color: 0xf59e0b, label: "v₄ (Dư)" }
                ],
                spanType: "box_3d",
                is3D: true
            },
            {
                id: 6,
                title: "Trường hợp tầm thường",
                badge: "Span = {0}",
                badgeColor: "bg-slate-200 text-slate-600 border-slate-300",
                desc: "Tập hợp chỉ chứa vectơ không hoặc không có vectơ nào. Tổ hợp tuyến tính duy nhất tạo ra là vectơ không. Không gian sinh là một điểm duy nhất.",
                features: [
                    "Chỉ có vectơ không.",
                    "Không có hướng, độ dài bằng 0.",
                    "Số chiều của không gian sinh = 0."
                ],
                vectors: [],
                spanType: "point",
                is3D: true
            }
        ];

        // --- Three.js Logic ---
        let scene, camera, renderer, controls;
        let sceneObjects = []; 

        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            // Match bg-slate-100 roughly
            scene.background = new THREE.Color(0xf1f5f9); 
            scene.fog = new THREE.Fog(0xf1f5f9, 10, 50);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(6, 6, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Grid & Axes
            const gridHelper = new THREE.GridHelper(10, 10, 0xcbd5e1, 0xe2e8f0);
            scene.add(gridHelper);
            const axesHelper = new THREE.AxesHelper(3);
            scene.add(axesHelper);

            window.addEventListener('resize', onWindowResize, false);
            animate();
            switchCase(0);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function clearScene() {
            sceneObjects.forEach(obj => scene.remove(obj));
            sceneObjects = [];
        }

        function createArrow(dir, color, label) {
            const origin = new THREE.Vector3(0, 0, 0);
            const direction = new THREE.Vector3(...dir).normalize();
            const length = Math.max(2, new THREE.Vector3(...dir).length()); 
            const hex = color;
            
            const arrowHelper = new THREE.ArrowHelper(direction, origin, length, hex, 0.3, 0.2);
            scene.add(arrowHelper);
            sceneObjects.push(arrowHelper);
        }

        function createSpanVisual(type, vectors) {
            let mesh;

            if (type === 'plane_2d' || type === 'plane_3d') {
                const geometry = new THREE.PlaneGeometry(8, 8, 10, 10);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x8b5cf6, side: THREE.DoubleSide, transparent: true, opacity: 0.15 
                });
                mesh = new THREE.Mesh(geometry, material);
                
                if (type === 'plane_2d') mesh.rotation.x = -Math.PI / 2;
                // plane_3d assumes XY plane based on data config
                
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x7c3aed, opacity: 0.4 }));
                if (type === 'plane_2d') line.rotation.x = -Math.PI / 2;
                
                scene.add(mesh); scene.add(line);
                sceneObjects.push(mesh, line);

            } else if (type === 'line_2d' || type === 'line_3d') {
                if (vectors.length > 0) {
                    const dir = new THREE.Vector3(...vectors[0].dir).normalize();
                    const geometry = new THREE.CylinderGeometry(0.05, 0.05, 10, 8);
                    const material = new THREE.MeshBasicMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.3 });
                    const cylinder = new THREE.Mesh(geometry, material);
                    
                    const axis = new THREE.Vector3(0, 1, 0);
                    const quaternion = new THREE.Quaternion();
                    quaternion.setFromUnitVectors(axis, dir);
                    cylinder.quaternion.copy(quaternion);
                    
                    scene.add(cylinder);
                    sceneObjects.push(cylinder);
                }
            } else if (type === 'box_3d') {
                const geometry = new THREE.BoxGeometry(6, 6, 6);
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x4F46E5, opacity: 0.1 }));
                scene.add(line);
                sceneObjects.push(line);

                // Particles to show volume
                const particlesGeo = new THREE.BufferGeometry();
                const count = 300;
                const posArray = new Float32Array(count * 3);
                for(let i=0; i<count*3; i++) posArray[i] = (Math.random() - 0.5) * 7;
                particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMat = new THREE.PointsMaterial({ size: 0.04, color: 0x4F46E5, transparent: true, opacity: 0.4 });
                const particles = new THREE.Points(particlesGeo, particlesMat);
                scene.add(particles);
                sceneObjects.push(particles);

            } else if (type === 'point') {
                const geometry = new THREE.SphereGeometry(0.15, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
                const sphere = new THREE.Mesh(geometry, material);
                scene.add(sphere);
                sceneObjects.push(sphere);
            }
        }

        function switchCase(index) {
            const data = cases[index];
            
            // UI Updates
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const navItem = document.getElementById(`nav-${index}`);
            if(navItem) navItem.classList.add('active');
            
            document.getElementById('case-title').innerText = data.title;
            const badge = document.getElementById('case-badge');
            badge.className = `inline-block px-3 py-1 text-xs font-bold rounded-full border ${data.badgeColor}`;
            badge.innerHTML = data.badge;
            
            document.getElementById('case-desc').innerHTML = data.desc;
            
            const featuresList = document.getElementById('case-features');
            featuresList.innerHTML = '';
            data.features.forEach(f => {
                const li = document.createElement('li');
                li.className = "flex items-start gap-2";
                li.innerHTML = `<i class="fa-solid fa-check text-green-500 mt-1 text-xs"></i> <span>${f}</span>`;
                featuresList.appendChild(li);
            });

            const legendDiv = document.getElementById('case-legend');
            legendDiv.innerHTML = '';
            data.vectors.forEach((v, i) => {
                const colorHex = '#' + v.color.toString(16).padStart(6, '0');
                const item = document.createElement('div');
                item.className = "flex items-center gap-2 text-sm";
                item.innerHTML = `<span class="w-3 h-3 rounded-full" style="background-color: ${colorHex}"></span><span class="text-slate-600 font-mono">${v.label}</span>`;
                legendDiv.appendChild(item);
            });
            // Add span legend
            const spanItem = document.createElement('div');
            spanItem.className = "flex items-center gap-2 text-sm mt-2 pt-2 border-t border-slate-100";
            spanItem.innerHTML = `<span class="w-3 h-3 rounded bg-purple-400 opacity-40"></span><span class="text-slate-500 italic">Vùng không gian sinh</span>`;
            legendDiv.appendChild(spanItem);

            if (window.MathJax) MathJax.typesetPromise();

            // 3D Updates
            clearScene();
            
            if (!data.is3D) {
                camera.position.set(0, 0, 8);
                controls.enableRotate = false;
            } else {
                camera.position.set(6, 6, 6);
                controls.enableRotate = true;
            }

            data.vectors.forEach(v => createArrow(v.dir, v.color, v.label));
            createSpanVisual(data.spanType, data.vectors);
        }

        function resetCamera() {
            controls.reset();
            const currentCase = cases.find(c => document.getElementById(`nav-${c.id}`).classList.contains('active'));
            if(currentCase && !currentCase.is3D) {
                camera.position.set(0, 0, 8);
            } else {
                camera.position.set(6, 6, 6);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // Subtle rotation for particles/box
            sceneObjects.forEach(obj => {
                if(obj.isPoints) {
                    obj.rotation.y += 0.002;
                    obj.rotation.x += 0.001;
                }
            });

            renderer.render(scene, camera);
        }

        // Mobile Menu Logic
        function toggleSidebar() {
            const sidebar = document.getElementById('mobile-nav');
            const overlay = document.getElementById('mobile-sidebar');
            const isHidden = sidebar.classList.contains('-translate-x-full');
            
            if (isHidden) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                // Clone nav content if empty
                if(document.getElementById('mobile-nav-content').innerHTML === '') {
                    document.getElementById('mobile-nav-content').innerHTML = document.querySelector('aside nav').innerHTML;
                    // Re-attach onclick events roughly by cloning nodes or just relying on global function switchCase
                }
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        window.onload = initThree;
    </script>
</body>
</html>
