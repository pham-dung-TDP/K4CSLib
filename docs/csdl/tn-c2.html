    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); min-height: 100vh; }
        
        /* Question grid styles */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 8px;
        }
        
        .question-grid-item {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
        }
        
        .question-grid-item:hover {
            transform: scale(1.05);
        }
        
        .question-grid-item.active {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
        
        .question-grid-item.answered {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .question-grid-item.flagged {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            position: relative;
        }
        
        .question-grid-item.flagged::after {
            content: "🚩";
            position: absolute;
            top: -4px;
            right: -4px;
            font-size: 10px;
        }
        
        .question-grid-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Option styles */
        .option-item {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid #e5e7eb;
            background: white;
        }
        
        .option-item:hover:not(.disabled) {
            transform: translateX(4px);
            border-color: #dc2626;
            background-color: #fef2f2;
        }
        
        .option-item.selected-correct {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #10b981;
            color: white;
        }
        
        .option-item.selected-correct .option-marker { background: white; color: #10b981; }
        .option-item.selected-wrong {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-color: #ef4444;
            color: white;
        }
        .option-item.selected-wrong .option-marker { background: white; color: #ef4444; }
        .option-item.correct-answer {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #10b981;
            color: white;
            opacity: 0.8;
        }
        .option-item.correct-answer .option-marker { background: white; color: #10b981; }
        .option-item.selected {
            border-color: #dc2626;
            background-color: #fef2f2;
        }
        .option-item.selected .option-marker { background-color: #dc2626; color: white; }
        
        .option-marker {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #f3f4f6;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        
        .flag-btn { transition: all 0.2s ease; }
        .flag-btn.flagged {
            background-color: #fef3c7;
            border-color: #f59e0b;
            color: #d97706;
        }
        
        .progress-bar { transition: width 0.5s ease-out; }
        .result-card { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .latex-content { font-size: 1rem; line-height: 1.5; }
        .latex-content mjx-container { overflow-x: auto; overflow-y: hidden; display: inline-block; }
        mjx-container[jax="CHTML"][display="true"] { margin: 0.5em 0; overflow-x: auto; overflow-y: hidden; }
        
        @media (max-width: 768px) {
            .option-item { padding: 12px !important; }
            .option-text { font-size: 14px; }
            .latex-content { font-size: 14px; }
            .questions-grid { grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 8px; }
            .question-grid-item { font-size: 14px; }
            .option-marker { width: 28px; height: 28px; font-size: 14px; }
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #dc2626;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 4px; }
        
        .review-item { transition: all 0.2s ease; margin-bottom: 16px; }
        .review-item:hover { transform: translateX(4px); }
        
        /* Custom scrollbar for questions grid */
        .questions-grid::-webkit-scrollbar { width: 6px; }
        .questions-grid::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 10px; }
        .questions-grid::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 10px; }
    </style>
</head>

        let currentQuestions = [];
        let userAnswers = [];
        let flaggedQuestions = [];
        let currentQuestion = 0;
        let quizSubmitted = false;
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function initializeQuiz() {
            let questions = [...originalQuestions];
            if (CONFIG.SHUFFLE_QUESTIONS) {
                questions = shuffleArray(questions);
            }
            currentQuestions = questions.map((q, idx) => ({ ...q, id: idx }));
            userAnswers = new Array(currentQuestions.length).fill(null).map(() => []);
            flaggedQuestions = new Array(currentQuestions.length).fill(false);
        }
        
        function saveProgress() {
            if (!CONFIG.AUTO_SAVE || quizSubmitted) return;
            const progress = {
                currentQuestions: currentQuestions,
                userAnswers: userAnswers,
                flaggedQuestions: flaggedQuestions,
                currentQuestion: currentQuestion,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(progress));
        }
        
        function loadProgress() {
            const saved = localStorage.getItem(CONFIG.SAVE_KEY);
            if (!saved) return false;
            try {
                const progress = JSON.parse(saved);
                if (progress.currentQuestions && progress.currentQuestions.length === originalQuestions.length) {
                    currentQuestions = progress.currentQuestions;
                    userAnswers = progress.userAnswers;
                    flaggedQuestions = progress.flaggedQuestions;
                    currentQuestion = progress.currentQuestion;
                    return true;
                }
            } catch (e) {}
            return false;
        }
        
        function clearProgress() {
            localStorage.removeItem(CONFIG.SAVE_KEY);
        }
        
        function renderLatex() {
            if (window.MathJax) {
                const elements = document.querySelectorAll('.latex-content');
                if (elements.length > 0) {
                    MathJax.typesetPromise(elements).catch(err => console.log('MathJax error:', err));
                }
            }
        }
        
        function getAnsweredCount() {
            return userAnswers.filter(ans => ans && ans.length > 0).length;
        }
        
        function getFlaggedCount() {
            return flaggedQuestions.filter(f => f).length;
        }
        
        function updateStats() {
            document.getElementById('answeredCount').textContent = getAnsweredCount();
            document.getElementById('flaggedCount').textContent = getFlaggedCount();
        }
        
        function renderQuestionsGrid() {
            const grid = document.getElementById('questionsGrid');
            grid.innerHTML = currentQuestions.map((_, idx) => {
                let statusClass = '';
                if (userAnswers[idx] && userAnswers[idx].length > 0) statusClass = 'answered';
                if (flaggedQuestions[idx]) statusClass = 'flagged';
                if (idx === currentQuestion && !quizSubmitted) statusClass += ' active';
                
                return `
                    <div class="question-grid-item ${statusClass} ${quizSubmitted ? 'disabled' : ''}"
                         onclick="${!quizSubmitted ? `goToQuestion(${idx})` : ''}">
                        ${idx + 1}
                    </div>
                `;
            }).join('');
            updateStats();
        }
        
        function toggleOption(questionIdx, optionIdx) {
            if (quizSubmitted) return;
            const question = currentQuestions[questionIdx];
            if (question.type === 'single') {
                userAnswers[questionIdx] = [optionIdx];
            } else {
                if (!userAnswers[questionIdx]) userAnswers[questionIdx] = [];
                const index = userAnswers[questionIdx].indexOf(optionIdx);
                if (index === -1) userAnswers[questionIdx].push(optionIdx);
                else userAnswers[questionIdx].splice(index, 1);
            }
            renderQuiz();
            renderQuestionsGrid();
            saveProgress();
        }
        
        function toggleFlag(questionIdx) {
            if (quizSubmitted) return;
            flaggedQuestions[questionIdx] = !flaggedQuestions[questionIdx];
            renderQuiz();
            renderQuestionsGrid();
            saveProgress();
        }
        
        function goToQuestion(index) {
            if (quizSubmitted) return;
            currentQuestion = index;
            renderQuiz();
            renderQuestionsGrid();
            saveProgress();
        }
        
        function checkAnswer(question, userAnswer) {
            const correct = question.correct;
            const sortedUser = [...userAnswer].sort();
            const sortedCorrect = [...correct].sort();
            if (question.type === 'single') {
                return userAnswer.length === 1 && userAnswer[0] === correct[0];
            }
            return sortedUser.length === sortedCorrect.length && 
                   sortedUser.every((val, i) => val === sortedCorrect[i]);
        }
        
        function calculateScore() {
            let correctCount = 0;
            currentQuestions.forEach((question, idx) => {
                if (checkAnswer(question, userAnswers[idx] || [])) correctCount++;
            });
            return { score: correctCount, total: currentQuestions.length, percentage: (correctCount / currentQuestions.length) * 100 };
        }
        
        function renderQuiz() {
            if (!currentQuestions.length) return;
            
            const container = document.getElementById('quizContainer');
            const question = currentQuestions[currentQuestion];
            const isFlagged = flaggedQuestions[currentQuestion];
            
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <div class="bg-gradient-to-r from-red-50 to-red-100 p-4 border-b border-red-200">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex items-start gap-3 flex-1">
                                <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center flex-shrink-0">
                                    <span class="text-white font-bold">${currentQuestion + 1}</span>
                                </div>
                                <h3 class="text-lg font-semibold text-gray-800 flex-1 latex-content leading-relaxed">${question.text}</h3>
                            </div>
                            <button id="flagBtn" class="flag-btn w-10 h-10 rounded-lg border-2 flex-shrink-0 ${isFlagged ? 'flagged border-orange-500 bg-orange-50 text-orange-600' : 'border-gray-300 bg-white text-gray-400 hover:border-orange-400'}"
                                    onclick="toggleFlag(${currentQuestion})">
                                <i class="fas fa-flag"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <div class="text-sm text-gray-500 mb-4 pb-2 border-b border-gray-100">
                            <i class="fas ${question.type === 'single' ? 'fa-dot-circle' : 'fa-check-square'} text-red-600 mr-1"></i>
                            ${question.type === 'single' ? 'Chọn một đáp án' : 'Chọn nhiều đáp án'}
                        </div>
                        
                        <div class="space-y-3">
                            ${question.options.map((option, idx) => {
                                const isSelected = userAnswers[currentQuestion]?.includes(idx) || false;
                                const prefix = String.fromCharCode(65 + idx);
                                return `
                                    <div class="option-item p-4 rounded-xl transition-all ${!quizSubmitted ? 'cursor-pointer' : ''} ${isSelected ? 'selected' : ''}"
                                         onclick="${!quizSubmitted ? `toggleOption(${currentQuestion}, ${idx})` : ''}">
                                        <div class="flex items-start gap-3">
                                            <div class="option-marker flex-shrink-0 ${isSelected ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-600'}">
                                                ${prefix}
                                            </div>
                                            <div class="option-text flex-1 text-gray-700 latex-content">${option}</div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        
                        <div class="flex justify-between mt-6 pt-4 border-t border-gray-200">
                            <button id="prevBtn" class="px-5 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition ${currentQuestion === 0 ? 'opacity-50 cursor-not-allowed' : ''}"
                                    ${currentQuestion === 0 ? 'disabled' : ''}>
                                <i class="fas fa-chevron-left mr-2"></i>Câu trước
                            </button>
                            <button id="nextBtn" class="px-5 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                                Câu tiếp theo<i class="fas fa-chevron-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('prevBtn')?.addEventListener('click', () => {
                if (currentQuestion > 0) { currentQuestion--; renderQuiz(); renderQuestionsGrid(); saveProgress(); }
            });
            document.getElementById('nextBtn')?.addEventListener('click', () => {
                if (currentQuestion < currentQuestions.length - 1) { currentQuestion++; renderQuiz(); renderQuestionsGrid(); saveProgress(); }
            });
            
            setTimeout(() => renderLatex(), 100);
        }
        
        function submitQuiz() {
            const unanswered = getAnsweredCount();
            if (unanswered < currentQuestions.length && !confirm(`Bạn còn ${currentQuestions.length - unanswered} câu chưa trả lời. Bạn có chắc muốn nộp bài?`)) return;
            quizSubmitted = true;
            clearProgress();
            showResult();
        }
        
        function showResult() {
            const result = calculateScore();
            const percentage = result.percentage;
            document.getElementById('scoreDisplay').textContent = result.score;
            document.getElementById('totalDisplay').textContent = result.total;
            document.getElementById('scoreBar').style.width = `${percentage}%`;
            
            let message = '', icon = '';
            if (percentage >= 80) { message = '🎉 Xuất sắc! Bạn đã nắm vững kiến thức.'; icon = '<i class="fas fa-trophy text-5xl text-yellow-500"></i>'; }
            else if (percentage >= 60) { message = '👍 Khá tốt! Bạn hiểu bài nhưng cần ôn tập thêm.'; icon = '<i class="fas fa-smile text-5xl text-green-500"></i>'; }
            else if (percentage >= 40) { message = '📚 Cố gắng hơn nhé! Hãy xem lại đáp án.'; icon = '<i class="fas fa-book text-5xl text-blue-500"></i>'; }
            else { message = '💪 Đừng nản! Hãy xem lại bài giảng và thử lại.'; icon = '<i class="fas fa-heart text-5xl text-red-500"></i>'; }
            
            document.getElementById('resultIcon').innerHTML = icon;
            document.getElementById('resultMessage').innerHTML = message;
            document.getElementById('resultModal').classList.remove('hidden');
        }
        
        function showReview() {
            const reviewContent = document.getElementById('reviewContent');
            reviewContent.innerHTML = currentQuestions.map((question, idx) => {
                const userAnswer = userAnswers[idx] || [];
                const isCorrect = checkAnswer(question, userAnswer);
                
                // Lấy nội dung đáp án đã chọn
                const userAnswerText = userAnswer.length > 0 
                    ? userAnswer.map(ans => {
                        const prefix = String.fromCharCode(65 + ans);
                        const content = question.options[ans];
                        return `${prefix}. ${content}`;
                    }).join('; ')
                    : 'Chưa trả lời';
                
                // Lấy nội dung đáp án đúng
                const correctAnswerText = question.correct.map(ans => {
                    const prefix = String.fromCharCode(65 + ans);
                    const content = question.options[ans];
                    return `${prefix}. ${content}`;
                }).join('; ');
                
                return `
                    <div class="review-item border rounded-xl p-4 ${isCorrect ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}">
                        <div class="flex items-start gap-3 mb-3">
                            <div class="w-8 h-8 rounded-full ${isCorrect ? 'bg-green-500' : 'bg-red-500'} text-white flex items-center justify-center flex-shrink-0">
                                ${isCorrect ? '<i class="fas fa-check text-sm"></i>' : '<i class="fas fa-times text-sm"></i>'}
                            </div>
                            <div class="flex-1">
                                <h4 class="font-semibold text-gray-800 latex-content">Câu ${idx + 1}: ${question.text}</h4>
                            </div>
                        </div>
                        
                        <div class="ml-11 space-y-3 text-sm">
                            <div class="bg-white rounded-lg p-3">
                                <p class="font-medium text-gray-700 mb-2">
                                    <i class="fas fa-user-edit text-blue-500 mr-2"></i>Đáp án bạn chọn:
                                </p>
                                <p class="${isCorrect ? 'text-green-700' : 'text-red-700'} ml-4">${userAnswerText}</p>
                            </div>
                            
                            <div class="bg-white rounded-lg p-3">
                                <p class="font-medium text-gray-700 mb-2">
                                    <i class="fas fa-check-circle text-green-500 mr-2"></i>Đáp án đúng:
                                </p>
                                <p class="text-green-700 ml-4">${correctAnswerText}</p>
                            </div>
                            
                            <div class="bg-blue-50 rounded-lg p-3">
                                <p class="font-medium text-blue-700 mb-2">
                                    <i class="fas fa-info-circle mr-2"></i>Giải thích:
                                </p>
                                <p class="text-gray-700 ml-4 latex-content">${question.explanation}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            setTimeout(() => renderLatex(), 100);
            document.getElementById('reviewModal').classList.remove('hidden');
            document.getElementById('resultModal').classList.add('hidden');
        }
        
        function retakeQuiz() {
            if (confirm('Làm lại bài sẽ xóa toàn bộ tiến trình. Bạn có chắc?')) {
                clearProgress();
                initializeQuiz();
                userAnswers = new Array(currentQuestions.length).fill(null).map(() => []);
                flaggedQuestions = new Array(currentQuestions.length).fill(false);
                currentQuestion = 0;
                quizSubmitted = false;
                document.getElementById('resultModal').classList.add('hidden');
                document.getElementById('reviewModal').classList.add('hidden');
                renderQuiz();
                renderQuestionsGrid();
                saveProgress();
            }
        }
        
        // Event listeners
        document.getElementById('submitQuizBtn')?.addEventListener('click', submitQuiz);
        document.getElementById('reviewAnswersBtn')?.addEventListener('click', showReview);
        document.getElementById('retakeQuizBtn')?.addEventListener('click', retakeQuiz);
        document.getElementById('closeReviewBtn')?.addEventListener('click', () => document.getElementById('reviewModal').classList.add('hidden'));
        document.getElementById('resultModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('resultModal')) document.getElementById('resultModal').classList.add('hidden'); });
        document.getElementById('reviewModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('reviewModal')) document.getElementById('reviewModal').classList.add('hidden'); });
        
        // Khởi tạo
        const hasProgress = loadProgress();
        if (!hasProgress) initializeQuiz();
        renderQuiz();
        renderQuestionsGrid();
        if (!hasProgress) saveProgress();
    </script>
</body>
</html>
