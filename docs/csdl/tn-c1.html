    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            min-height: 100vh;
        }
        
        .quiz-card {
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Option styles */
        .option-item {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid #e5e7eb;
            background: white;
        }
        
        .option-item:hover:not(.disabled) {
            transform: translateX(4px);
            border-color: #dc2626;
            background-color: #fef2f2;
        }
        
        .option-item.selected-correct {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #10b981;
            color: white;
        }
        
        .option-item.selected-correct .option-marker {
            background: white;
            color: #10b981;
        }
        
        .option-item.selected-wrong {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-color: #ef4444;
            color: white;
        }
        
        .option-item.selected-wrong .option-marker {
            background: white;
            color: #ef4444;
        }
        
        .option-item.correct-answer {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #10b981;
            color: white;
            opacity: 0.8;
        }
        
        .option-item.correct-answer .option-marker {
            background: white;
            color: #10b981;
        }
        
        .option-item.selected {
            border-color: #dc2626;
            background-color: #fef2f2;
        }
        
        .option-item.selected .option-marker {
            background-color: #dc2626;
            color: white;
        }
        
        .option-marker {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #f3f4f6;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        
        /* Question navigation */
        .question-nav-btn {
            transition: all 0.2s ease;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .question-nav-btn:hover {
            transform: scale(1.05);
        }
        
        .question-nav-btn.active {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.3);
        }
        
        .question-nav-btn.answered {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
        }
        
        .question-nav-btn.flagged {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
            position: relative;
        }
        
        .question-nav-btn.flagged::after {
            content: "🚩";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 12px;
        }
        
        /* Flag button */
        .flag-btn {
            transition: all 0.2s ease;
        }
        
        .flag-btn.flagged {
            background-color: #fef3c7;
            border-color: #f59e0b;
            color: #d97706;
        }
        
        /* Progress bar */
        .progress-bar {
            transition: width 0.5s ease-out;
        }
        
        /* Result card */
        .result-card {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* LaTeX content */
        .latex-content {
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .latex-content mjx-container {
            overflow-x: auto;
            overflow-y: hidden;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #dc2626;
            border-radius: 4px;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .option-item {
                padding: 12px !important;
            }
            
            .option-text {
                font-size: 14px;
            }
            
            .question-nav-btn {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
        }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #dc2626;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Review section */
        .review-item {
            transition: all 0.2s ease;
        }
        
        .review-item:hover {
            transform: translateX(4px);
        }
    </style>

                    "Tên quan hệ, tên thuộc tính"
                ],
                correct: [3],
                explanation: "Một quan hệ phải bao gồm cả dữ liệu (thể hiện/các dòng), chỉ có tên và thuộc tính thì mới là lược đồ."
            },
            {
                id: 20,
                text: "Lược đồ quan hệ chỉ đề cập đến những thông tin gì?",
                type: "single",
                options: [
                    "Tên các thuộc tính và các dòng dữ liệu",
                    "Tên quan hệ và tên các thuộc tính",
                    "Tên quan hệ và các dòng dữ liệu",
                    "Tên thuộc tính và các bộ giá trị"
                ],
                correct: [1],
                explanation: "Lược đồ (Schema) chỉ quy định cấu trúc: Tên quan hệ và các cột (thuộc tính)."
            },
            {
                id: 21,
                text: "Chọn phát biểu đúng với thuật ngữ \"Thuộc tính\":",
                type: "single",
                options: [
                    "Thuộc tính là một đặc trưng của quan hệ. Mỗi thuộc tính bao giờ cũng có tên và một miền giá trị gọi là miền xác định của thuộc tính.",
                    "Thuộc tính là một đặc trưng của quan hệ.",
                    "Mỗi thuộc tính bao giờ cũng có tên và một miền giá trị gọi là miền xác định của thuộc tính.",
                    "Thuộc tính là một tập con của tích Đề-các của một hoặc nhiều miền thuộc tính."
                ],
                correct: [0],
                explanation: "Định nghĩa đầy đủ nhất về thuộc tính bao gồm cả tên và miền giá trị."
            },
            {
                id: 22,
                text: "Miền giá trị để chỉ?",
                type: "single",
                options: [
                    "Tên của một cột",
                    "Một hàng trong bảng",
                    "Một bảng",
                    "Kiểu dữ liệu của một cột"
                ],
                correct: [3],
                explanation: "Miền giá trị (Domain) quy định kiểu dữ liệu và tập các giá trị hợp lệ cho một cột."
            },
            {
                id: 23,
                text: "Miền giá trị của thuộc tính A ký hiệu là gì?",
                type: "single",
                options: [
                    "Dim(A)",
                    "Dom(A)",
                    "Dam(A)",
                    "Dem(A)"
                ],
                correct: [1],
                explanation: "Dom là viết tắt của Domain."
            },
            {
                id: 24,
                text: "Một tập con của tích Descartes của một hay nhiều miền thuộc tính là:",
                type: "single",
                options: [
                    "Một quan hệ trên một tập các thuộc tính",
                    "Một miền",
                    "Một CSDL",
                    "Một lược đồ quan hệ"
                ],
                correct: [0],
                explanation: "Định nghĩa toán học của một quan hệ (Relation)."
            },
            {
                id: 25,
                text: "Để chỉ một quan hệ r xác định trên tập thuộc tính R dùng ký hiệu nào?",
                type: "single",
                options: [
                    "r(R)",
                    "r*R",
                    "r x R",
                    "R(r)"
                ],
                correct: [0],
                explanation: "Ký hiệu chuẩn: r(R) (quan hệ r trên tập thuộc tính R)."
            }
        ];

        // Biến toàn cục
        let currentQuestions = [];      // Câu hỏi sau khi xử lý (có thể đã trộn)
        let userAnswers = [];           // Câu trả lời của user
        let flaggedQuestions = [];      // Các câu đã gắn cờ
        let currentQuestion = 0;
        let quizSubmitted = false;
        let quizStarted = false;

        // ==================== HÀM XỬ LÝ TRỘN ====================
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function shuffleQuestion(question, index) {
            const shuffledQuestion = { ...question, id: index };
            
            if (CONFIG.SHUFFLE_OPTIONS && question.type !== 'custom') {
                // Tạo mapping giữa index cũ và mới
                const originalIndices = question.options.map((_, idx) => idx);
                const shuffledIndices = shuffleArray([...originalIndices]);
                
                // Trộn đáp án
                shuffledQuestion.options = shuffledIndices.map(idx => question.options[idx]);
                
                // Cập nhật đáp án đúng theo mapping mới
                shuffledQuestion.correct = question.correct.map(oldIdx => 
                    shuffledIndices.indexOf(oldIdx)
                ).sort();
            } else {
                shuffledQuestion.options = [...question.options];
                shuffledQuestion.correct = [...question.correct];
            }
            
            return shuffledQuestion;
        }

        function initializeQuiz() {
            // Tạo bản sao câu hỏi
            let questions = [...originalQuestions];
            
            // Trộn câu hỏi nếu bật
            if (CONFIG.SHUFFLE_QUESTIONS) {
                questions = shuffleArray(questions);
            }
            
            // Xử lý trộn đáp án cho từng câu
            currentQuestions = questions.map((q, idx) => shuffleQuestion(q, idx));
            
            // Khởi tạo answers và flags
            userAnswers = new Array(currentQuestions.length).fill(null).map(() => []);
            flaggedQuestions = new Array(currentQuestions.length).fill(false);
        }

        // ==================== LOCALSTORAGE ====================
        function saveProgress() {
            if (!CONFIG.AUTO_SAVE || quizSubmitted) return;
            
            const progress = {
                currentQuestions: currentQuestions,
                userAnswers: userAnswers,
                flaggedQuestions: flaggedQuestions,
                currentQuestion: currentQuestion,
                quizStarted: true,
                timestamp: new Date().toISOString(),
                configSnapshot: {
                    SHUFFLE_QUESTIONS: CONFIG.SHUFFLE_QUESTIONS,
                    SHUFFLE_OPTIONS: CONFIG.SHUFFLE_OPTIONS
                }
            };
            
            localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(progress));
        }

        function loadProgress() {
            const saved = localStorage.getItem(CONFIG.SAVE_KEY);
            if (!saved) return false;
            
            try {
                const progress = JSON.parse(saved);
                // Kiểm tính hợp lệ của config
                if (progress.configSnapshot.SHUFFLE_QUESTIONS === CONFIG.SHUFFLE_QUESTIONS &&
                    progress.configSnapshot.SHUFFLE_OPTIONS === CONFIG.SHUFFLE_OPTIONS) {
                    currentQuestions = progress.currentQuestions;
                    userAnswers = progress.userAnswers;
                    flaggedQuestions = progress.flaggedQuestions;
                    currentQuestion = progress.currentQuestion;
                    quizStarted = progress.quizStarted;
                    return true;
                }
            } catch (e) {
                console.error('Error loading progress:', e);
            }
            return false;
        }

        function clearProgress() {
            localStorage.removeItem(CONFIG.SAVE_KEY);
        }

        // ==================== RENDER MATH ====================
        function renderMath() {
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // ==================== KIỂM TRA ĐÁP ÁN ====================
        function checkAnswer(question, userAnswer) {
            const correct = question.correct;
            const sortedUser = [...userAnswer].sort();
            const sortedCorrect = [...correct].sort();
            
            if (question.type === 'single') {
                return userAnswer.length === 1 && userAnswer[0] === correct[0];
            } else {
                return sortedUser.length === sortedCorrect.length && 
                       sortedUser.every((val, i) => val === sortedCorrect[i]);
            }
        }

        // ==================== RENDER QUIZ ====================
        function renderQuiz() {
            if (!currentQuestions.length) return;
            
            const container = document.getElementById('quizContainer');
            const question = currentQuestions[currentQuestion];
            const isAnswered = userAnswers[currentQuestion] && userAnswers[currentQuestion].length > 0;
            const isFlagged = flaggedQuestions[currentQuestion];
            
            container.innerHTML = `
                <!-- Progress Bar -->
                <div class="bg-white rounded-xl shadow-lg mb-4 p-4">
                    <div class="flex justify-between text-sm text-gray-600 mb-2 flex-wrap gap-2">
                        <span><i class="fas fa-question-circle text-red-600 mr-1"></i>Câu ${currentQuestion + 1}/${currentQuestions.length}</span>
                        <span><i class="fas fa-check-circle text-green-600 mr-1"></i>Đã trả lời: ${getAnsweredCount()}/${currentQuestions.length}</span>
                        <span><i class="fas fa-flag text-orange-500 mr-1"></i>Đã gắn cờ: ${flaggedQuestions.filter(f => f).length}</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div class="progress-bar bg-red-600 h-2 rounded-full" style="width: ${((currentQuestion + 1) / currentQuestions.length) * 100}%"></div>
                    </div>
                </div>

                <!-- Question Navigation -->
                <div class="bg-white rounded-xl shadow-lg p-4 mb-4 overflow-x-auto">
                    <div class="flex gap-2 justify-center min-w-max">
                        ${currentQuestions.map((_, idx) => `
                            <button class="question-nav-btn ${userAnswers[idx] && userAnswers[idx].length > 0 ? 'answered' : ''} ${flaggedQuestions[idx] ? 'flagged' : ''} ${idx === currentQuestion ? 'active' : ''}"
                                    onclick="goToQuestion(${idx})">
                                ${idx + 1}
                            </button>
                        `).join('')}
                    </div>
                </div>

                <!-- Current Question -->
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex items-start justify-between gap-3 mb-4">
                        <div class="flex items-start gap-3 flex-1">
                            <div class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center flex-shrink-0">
                                <span class="text-red-600 font-bold">${currentQuestion + 1}</span>
                            </div>
                            <h3 class="text-lg font-semibold text-gray-800 flex-1 latex-content">${question.text}</h3>
                        </div>
                        <button id="flagBtn" class="flag-btn w-10 h-10 rounded-lg border-2 ${isFlagged ? 'flagged border-orange-500 bg-orange-50 text-orange-600' : 'border-gray-300 bg-white text-gray-400 hover:border-orange-400'}"
                                onclick="toggleFlag(${currentQuestion})">
                            <i class="fas fa-flag"></i>
                        </button>
                    </div>
                    
                    <div class="text-sm text-gray-500 mb-4 pb-2 border-b border-gray-100">
                        <i class="fas ${question.type === 'single' ? 'fa-dot-circle' : 'fa-check-square'} mr-1"></i>
                        ${question.type === 'single' ? 'Chọn một đáp án' : 'Chọn nhiều đáp án'}
                    </div>

                    <div class="space-y-3">
                        ${question.options.map((option, idx) => {
                            const isSelected = userAnswers[currentQuestion]?.includes(idx) || false;
                            return `
                                <div class="option-item p-4 rounded-xl transition-all ${!quizSubmitted ? 'cursor-pointer' : ''} ${isSelected ? 'selected' : ''}"
                                     onclick="${!quizSubmitted ? `toggleOption(${currentQuestion}, ${idx})` : ''}">
                                    <div class="flex items-start gap-3">
                                        <div class="option-marker flex-shrink-0 ${isSelected ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-600'}">
                                            ${String.fromCharCode(65 + idx)}
                                        </div>
                                        <div class="option-text flex-1 text-gray-700 latex-content">${option}</div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <div class="flex justify-between mt-6 pt-4 border-t border-gray-200">
                        <button id="prevBtn" class="px-5 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition ${currentQuestion === 0 ? 'opacity-50 cursor-not-allowed' : ''}"
                                ${currentQuestion === 0 ? 'disabled' : ''}>
                            <i class="fas fa-chevron-left mr-2"></i>Câu trước
                        </button>
                        <div class="flex gap-2">
                            ${currentQuestion === currentQuestions.length - 1 ? `
                                <button id="submitBtn" class="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                    <i class="fas fa-check-circle mr-2"></i>Nộp bài
                                </button>
                            ` : `
                                <button id="nextBtn" class="px-5 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                                    Câu tiếp theo<i class="fas fa-chevron-right ml-2"></i>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;

            // Attach event listeners
            document.getElementById('prevBtn')?.addEventListener('click', () => {
                if (currentQuestion > 0) {
                    currentQuestion--;
                    renderQuiz();
                    saveProgress();
                }
            });

            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    if (currentQuestion < currentQuestions.length - 1) {
                        currentQuestion++;
                        renderQuiz();
                        saveProgress();
                    }
                });
            }

            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', submitQuiz);
            }
            
            // Render LaTeX
            setTimeout(() => renderMath(), 100);
        }

        function toggleOption(questionIdx, optionIdx) {
            if (quizSubmitted) return;
            
            const question = currentQuestions[questionIdx];
            
            if (question.type === 'single') {
                userAnswers[questionIdx] = [optionIdx];
            } else {
                if (!userAnswers[questionIdx]) {
                    userAnswers[questionIdx] = [];
                }
                const index = userAnswers[questionIdx].indexOf(optionIdx);
                if (index === -1) {
                    userAnswers[questionIdx].push(optionIdx);
                } else {
                    userAnswers[questionIdx].splice(index, 1);
                }
            }
            
            renderQuiz();
            saveProgress();
        }

        function toggleFlag(questionIdx) {
            if (quizSubmitted) return;
            flaggedQuestions[questionIdx] = !flaggedQuestions[questionIdx];
            renderQuiz();
            saveProgress();
        }

        function getAnsweredCount() {
            return userAnswers.filter(ans => ans && ans.length > 0).length;
        }

        function goToQuestion(index) {
            if (quizSubmitted) return;
            currentQuestion = index;
            renderQuiz();
            saveProgress();
        }

        function calculateScore() {
            let correctCount = 0;
            
            currentQuestions.forEach((question, idx) => {
                const userAnswer = userAnswers[idx] || [];
                if (checkAnswer(question, userAnswer)) {
                    correctCount++;
                }
            });
            
            return {
                score: correctCount,
                total: currentQuestions.length,
                percentage: (correctCount / currentQuestions.length) * 100
            };
        }

        function submitQuiz() {
            const unanswered = getAnsweredCount();
            if (unanswered < currentQuestions.length) {
                if (!confirm(`Bạn còn ${currentQuestions.length - unanswered} câu chưa trả lời. Bạn có chắc muốn nộp bài?`)) {
                    return;
                }
            }
            
            quizSubmitted = true;
            clearProgress();
            showResult();
        }

        function showResult() {
            const result = calculateScore();
            const percentage = result.percentage;
            
            document.getElementById('scoreDisplay').textContent = result.score;
            document.getElementById('totalDisplay').textContent = result.total;
            document.getElementById('scoreBar').style.width = `${percentage}%`;
            
            let message = '';
            let icon = '';
            
            if (percentage >= 80) {
                message = '🎉 Xuất sắc! Bạn đã nắm vững kiến thức. Hãy tiếp tục phát huy!';
                icon = '<i class="fas fa-trophy text-5xl text-yellow-500"></i>';
            } else if (percentage >= 60) {
                message = '👍 Khá tốt! Bạn hiểu bài nhưng cần ôn tập thêm một số phần.';
                icon = '<i class="fas fa-smile text-5xl text-green-500"></i>';
            } else if (percentage >= 40) {
                message = '📚 Cố gắng hơn nhé! Hãy xem lại đáp án để hiểu rõ hơn.';
                icon = '<i class="fas fa-book text-5xl text-blue-500"></i>';
            } else {
                message = '💪 Đừng nản! Hãy xem lại bài giảng và thử làm lại bài kiểm tra.';
                icon = '<i class="fas fa-heart text-5xl text-red-500"></i>';
            }
            
            document.getElementById('resultIcon').innerHTML = icon;
            document.getElementById('resultMessage').innerHTML = message;
            document.getElementById('resultModal').classList.remove('hidden');
            
            // Hiển thị đáp án ngay trên quiz
            showAnswersInQuiz();
        }
        
        function showAnswersInQuiz() {
            const container = document.getElementById('quizContainer');
            const question = currentQuestions[currentQuestion];
            
            // Cập nhật style cho các đáp án
            const optionsDiv = container.querySelectorAll('.option-item');
            optionsDiv.forEach((opt, idx) => {
                const isUserCorrect = checkAnswer(question, userAnswers[currentQuestion]);
                const isSelected = userAnswers[currentQuestion]?.includes(idx);
                const isCorrectAnswer = question.correct.includes(idx);
                
                opt.classList.remove('selected', 'selected-correct', 'selected-wrong', 'correct-answer');
                
                if (isSelected && isCorrectAnswer) {
                    opt.classList.add('selected-correct');
                } else if (isSelected && !isCorrectAnswer) {
                    opt.classList.add('selected-wrong');
                } else if (!isSelected && isCorrectAnswer) {
                    opt.classList.add('correct-answer');
                }
            });
        }

        function showReview() {
            const reviewContent = document.getElementById('reviewContent');
            const result = calculateScore();
            
            reviewContent.innerHTML = currentQuestions.map((question, idx) => {
                const userAnswer = userAnswers[idx] || [];
                const isCorrect = checkAnswer(question, userAnswer);
                const userAnswerText = userAnswer.map(ans => String.fromCharCode(65 + ans)).join(', ') || 'Chưa trả lời';
                const correctAnswerText = question.correct.map(ans => String.fromCharCode(65 + ans)).join(', ');
                
                return `
                    <div class="review-item border rounded-xl p-4 ${isCorrect ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}">
                        <div class="flex items-start gap-2 mb-2">
                            <div class="w-6 h-6 rounded-full ${isCorrect ? 'bg-green-500' : 'bg-red-500'} text-white flex items-center justify-center text-xs flex-shrink-0">
                                ${isCorrect ? '<i class="fas fa-check text-xs"></i>' : '<i class="fas fa-times text-xs"></i>'}
                            </div>
                            <h4 class="font-semibold text-gray-800 flex-1 latex-content">Câu ${idx + 1}: ${question.text}</h4>
                        </div>
                        <div class="ml-8 space-y-2 text-sm">
                            <p><span class="font-medium text-gray-600">Đáp án của bạn:</span> 
                                <span class="${isCorrect ? 'text-green-700 font-medium' : 'text-red-700 font-medium'}">${userAnswerText}</span>
                            </p>
                            <p><span class="font-medium text-gray-600">Đáp án đúng:</span> 
                                <span class="text-green-700 font-medium">${correctAnswerText}</span>
                            </p>
                            <p class="mt-2 text-gray-600 bg-white/70 p-3 rounded-lg latex-content">
                                <i class="fas fa-info-circle text-blue-500 mr-1"></i>
                                ${question.explanation}
                            </p>
                        </div>
                    </div>
                `;
            }).join('');
            
            renderMath();
            document.getElementById('reviewModal').classList.remove('hidden');
            document.getElementById('resultModal').classList.add('hidden');
        }

        function retakeQuiz() {
            if (confirm('Làm lại bài sẽ xóa toàn bộ tiến trình hiện tại. Bạn có chắc?')) {
                clearProgress();
                initializeQuiz();
                userAnswers = new Array(currentQuestions.length).fill(null).map(() => []);
                flaggedQuestions = new Array(currentQuestions.length).fill(false);
                currentQuestion = 0;
                quizSubmitted = false;
                quizStarted = true;
                document.getElementById('resultModal').classList.add('hidden');
                document.getElementById('reviewModal').classList.add('hidden');
                renderQuiz();
                saveProgress();
            }
        }

        // ==================== KHỞI TẠO ====================
        function init() {
            const hasProgress = loadProgress();
            
            if (!hasProgress) {
                initializeQuiz();
                userAnswers = new Array(currentQuestions.length).fill(null).map(() => []);
                flaggedQuestions = new Array(currentQuestions.length).fill(false);
                currentQuestion = 0;
                quizStarted = true;
            }
            
            renderQuiz();
            saveProgress();
        }

        // Event listeners
        document.getElementById('reviewAnswersBtn')?.addEventListener('click', showReview);
        document.getElementById('retakeQuizBtn')?.addEventListener('click', retakeQuiz);
        document.getElementById('closeReviewBtn')?.addEventListener('click', () => {
            document.getElementById('reviewModal').classList.add('hidden');
        });
        
        document.getElementById('resultModal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('resultModal')) {
                document.getElementById('resultModal').classList.add('hidden');
            }
        });
        
        document.getElementById('reviewModal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('reviewModal')) {
                document.getElementById('reviewModal').classList.add('hidden');
            }
        });

        // Start
        init();
    </script>
</body>
