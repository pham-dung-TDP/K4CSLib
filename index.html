<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>K4CSLib - Thư viện Tài liệu Khoa học Máy tính & Toán học</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom styles -->
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #f8fafc;
        }
        
        /* App-like card hover effect */
        .doc-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .doc-card:active {
            transform: scale(0.98);
        }
        
        /* Mobile-optimized touch targets */
        @media (max-width: 768px) {
            button, 
            .doc-card,
            .filter-chip {
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
            }
            
            .doc-card:active {
                background-color: #fef2f2;
            }
        }
        
        /* PC hover effects */
        @media (min-width: 769px) {
            .doc-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            }
        }
        
        .search-focus:focus {
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
            border-color: #dc2626;
        }
        
        .category-active {
            background-color: #dc2626;
            color: white;
            border-color: #dc2626;
        }
        
        .category-active i {
            color: white;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .doc-card {
            animation: slideIn 0.3s ease-out;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #dc2626;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #b91c1c;
        }
        
        /* Thumbnail container */
        .thumbnail-container {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #fee2e2 0%, #ffcdcd 100%);
        }
        
        .thumbnail-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .doc-card:hover .thumbnail-image {
            transform: scale(1.05);
        }
        
        /* Bottom sheet for mobile filters */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .bottom-sheet.open {
            transform: translateY(0);
        }
        
        .bottom-sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 999;
        }
        
        .bottom-sheet-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        
        /* Line clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Pagination styles */
        .pagination-btn {
            transition: all 0.2s ease;
        }
        
        .pagination-btn:active {
            transform: scale(0.95);
        }
        
        @media (min-width: 769px) {
            .pagination-btn:hover {
                transform: translateY(-2px);
            }
        }
        
        .page-number {
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header - App-like sticky -->
    <div class="sticky top-0 z-50 bg-gradient-to-r from-red-700 to-red-600 shadow-lg">
        <div class="px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur">
                        <i class="fas fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white tracking-tight">K4CSLib</h1>
                        <p class="text-red-100 text-xs">Thư viện tài liệu học tập</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="mobileFilterBtn" class="md:hidden w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur">
                        <i class="fas fa-sliders-h text-white"></i>
                    </button>
                </div>
            </div>
            
            <!-- Search Bar - Prominent on mobile -->
            <div class="mt-3 relative">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm tài liệu..." 
                       class="w-full pl-11 pr-4 py-3 rounded-xl bg-white text-gray-800 search-focus focus:outline-none shadow-sm">
            </div>
        </div>
    </div>

    <!-- Quick Categories - Horizontal scroll on mobile -->
    <div class="bg-white border-b border-gray-100 sticky top-[88px] md:top-[104px] z-40 shadow-sm">
        <div class="px-4 py-3 overflow-x-auto hide-scrollbar">
            <div class="flex gap-2" id="quickCategories">
                <button class="category-chip px-4 py-2 rounded-full bg-red-600 text-white whitespace-nowrap text-sm font-medium transition-all" data-category="all">
                    <i class="fas fa-th-large mr-2 text-xs"></i>Tất cả
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="pb-20">
        <!-- Stats Bar -->
        <div class="px-4 py-3 flex justify-between items-center bg-white border-b border-gray-100">
            <div class="text-sm text-gray-600">
                <i class="fas fa-book-open text-red-600 mr-2"></i>
                <span id="docCount">0</span> tài liệu
            </div>
            <div class="flex gap-1 bg-gray-100 rounded-lg p-1">
                <button id="gridView" class="px-3 py-1.5 rounded-md text-sm transition-all bg-red-600 text-white">
                    <i class="fas fa-th-large"></i>
                </button>
                <button id="listView" class="px-3 py-1.5 rounded-md text-sm transition-all bg-gray-100 text-gray-600">
                    <i class="fas fa-list"></i>
                </button>
            </div>
        </div>

        <!-- Documents Container -->
        <div id="documentsContainer" class="p-4">
            <!-- Skeleton loading -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {[...Array(6)].map(() => `
                    <div class="bg-white rounded-xl overflow-hidden shadow-sm">
                        <div class="skeleton h-48"></div>
                        <div class="p-4">
                            <div class="skeleton h-5 w-3/4 mb-2"></div>
                            <div class="skeleton h-4 w-full mb-1"></div>
                            <div class="skeleton h-4 w-2/3"></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>

        <!-- Pagination -->
        <div id="paginationContainer" class="px-4 py-6">
            <div class="flex justify-center items-center gap-2 flex-wrap">
                <button id="prevPage" class="pagination-btn px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    <i class="fas fa-chevron-left mr-1"></i>
                    <span class="hidden sm:inline">Trước</span>
                </button>
                <div id="pageNumbers" class="flex gap-2">
                    <!-- Page numbers will be inserted here -->
                </div>
                <button id="nextPage" class="pagination-btn px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    <span class="hidden sm:inline">Sau</span>
                    <i class="fas fa-chevron-right ml-1"></i>
                </button>
            </div>
        </div>

        <!-- No Results -->
        <div id="noResults" class="hidden text-center py-16 px-4">
            <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-folder-open text-4xl text-gray-400"></i>
            </div>
            <p class="text-gray-500 text-lg font-medium">Không tìm thấy tài liệu</p>
            <p class="text-gray-400 text-sm mt-1">Thử tìm kiếm với từ khóa khác</p>
        </div>
    </main>

    <!-- Bottom Sheet for Mobile Filters -->
    <div id="bottomSheetOverlay" class="bottom-sheet-overlay"></div>
    <div id="bottomSheet" class="bottom-sheet">
        <div class="sticky top-0 bg-white border-b border-gray-100 p-4 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-gray-800">
                <i class="fas fa-filter text-red-600 mr-2"></i>Bộ lọc
            </h3>
            <button id="closeBottomSheet" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
                <i class="fas fa-times text-gray-600"></i>
            </button>
        </div>
        <div class="p-4 space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    <i class="fas fa-layer-group text-red-600 mr-2"></i>Danh mục
                </label>
                <select id="mobileCategoryFilter" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-red-500">
                    <option value="all">Tất cả danh mục</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    <i class="fas fa-folder-tree text-red-600 mr-2"></i>Danh mục con
                </label>
                <select id="mobileSubcategoryFilter" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-red-500">
                    <option value="all">Tất cả danh mục con</option>
                </select>
            </div>
            <button id="applyFilters" class="w-full bg-red-600 text-white py-3 rounded-xl font-semibold hover:bg-red-700 transition">
                Áp dụng bộ lọc
            </button>
            <button id="clearFiltersMobile" class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-200 transition">
                Xóa bộ lọc
            </button>
        </div>
    </div>

    <script>
        let documents = [];
        let currentView = 'grid';
        let currentCategory = 'all';
        let currentSubcategory = 'all';
        let currentPage = 1;
        let itemsPerPage = 10;
        
        // Load documents from JSON
        async function loadDocuments() {
            try {
                const response = await fetch('documents.json');
                documents = await response.json();
                populateFilters();
                renderDocuments();
            } catch (error) {
                console.error('Error loading documents:', error);
                document.getElementById('documentsContainer').innerHTML = `
                    <div class="text-center py-12">
                        <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>
                        </div>
                        <p class="text-gray-600">Không thể tải dữ liệu</p>
                        <p class="text-gray-400 text-sm mt-1">Vui lòng kiểm tra lại file documents.json</p>
                    </div>
                `;
            }
        }
        
        // Populate filter dropdowns
        function populateFilters() {
            const categories = [...new Set(documents.map(doc => doc.category))];
            
            // Quick categories
            const quickCats = document.getElementById('quickCategories');
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-chip px-4 py-2 rounded-full bg-gray-100 text-gray-700 whitespace-nowrap text-sm font-medium transition-all';
                btn.setAttribute('data-category', category);
                btn.innerHTML = `<i class="fas fa-tag mr-2 text-xs"></i>${category}`;
                btn.onclick = () => {
                    currentCategory = category;
                    currentSubcategory = 'all';
                    currentPage = 1;
                    updateActiveCategory();
                    renderDocuments();
                };
                quickCats.appendChild(btn);
            });
            
            // Mobile category filter
            const mobileCatSelect = document.getElementById('mobileCategoryFilter');
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                mobileCatSelect.appendChild(option);
            });
        }
        
        function updateActiveCategory() {
            document.querySelectorAll('[data-category]').forEach(btn => {
                if (btn.getAttribute('data-category') === currentCategory) {
                    btn.classList.add('bg-red-600', 'text-white');
                    btn.classList.remove('bg-gray-100', 'text-gray-700');
                } else {
                    btn.classList.remove('bg-red-600', 'text-white');
                    btn.classList.add('bg-gray-100', 'text-gray-700');
                }
            });
        }
        
        // Update subcategory filter based on selected category
        function updateSubcategories(selectedCategory, isMobile = false) {
            let subcategories;
            if (selectedCategory === 'all') {
                subcategories = [...new Set(documents.map(doc => doc.subcategory).filter(sc => sc))];
            } else {
                subcategories = [...new Set(documents
                    .filter(doc => doc.category === selectedCategory)
                    .map(doc => doc.subcategory)
                    .filter(sc => sc))];
            }
            
            const mobileSelect = document.getElementById('mobileSubcategoryFilter');
            
            if (mobileSelect) {
                mobileSelect.innerHTML = '<option value="all">Tất cả danh mục con</option>';
                subcategories.forEach(subcat => {
                    const option = document.createElement('option');
                    option.value = subcat;
                    option.textContent = subcat;
                    mobileSelect.appendChild(option);
                });
            }
        }
        
        // Filter documents
        function getFilteredDocuments() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            return documents.filter(doc => {
                const matchesSearch = doc.title.toLowerCase().includes(searchTerm) ||
                                     doc.description.toLowerCase().includes(searchTerm);
                const matchesCategory = currentCategory === 'all' || doc.category === currentCategory;
                const matchesSubcategory = currentSubcategory === 'all' || doc.subcategory === currentSubcategory;
                
                return matchesSearch && matchesCategory && matchesSubcategory;
            });
        }
        
        // Get current page documents
        function getCurrentPageDocuments() {
            const filtered = getFilteredDocuments();
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            return filtered.slice(startIndex, endIndex);
        }
        
        // Render pagination
        function renderPagination() {
            const filteredDocs = getFilteredDocuments();
            const totalPages = Math.ceil(filteredDocs.length / itemsPerPage);
            const paginationContainer = document.getElementById('paginationContainer');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            
            if (totalPages <= 1) {
                paginationContainer.classList.add('hidden');
                return;
            }
            
            paginationContainer.classList.remove('hidden');
            
            // Update prev/next buttons
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
            
            // Generate page numbers
            const pageNumbersDiv = document.getElementById('pageNumbers');
            let pagesToShow = [];
            
            if (totalPages <= 5) {
                pagesToShow = Array.from({length: totalPages}, (_, i) => i + 1);
            } else {
                if (currentPage <= 3) {
                    pagesToShow = [1, 2, 3, 4, '...', totalPages];
                } else if (currentPage >= totalPages - 2) {
                    pagesToShow = [1, '...', totalPages - 3, totalPages - 2, totalPages - 1, totalPages];
                } else {
                    pagesToShow = [1, '...', currentPage - 1, currentPage, currentPage + 1, '...', totalPages];
                }
            }
            
            pageNumbersDiv.innerHTML = pagesToShow.map(page => {
                if (page === '...') {
                    return `<span class="px-2 text-gray-400">...</span>`;
                }
                const isActive = page === currentPage;
                return `
                    <button class="page-number pagination-btn rounded-lg font-medium transition-all ${isActive ? 'bg-red-600 text-white shadow-md' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}"
                            onclick="goToPage(${page})">
                        ${page}
                    </button>
                `;
            }).join('');
        }
        
        // Go to specific page
        function goToPage(page) {
            currentPage = page;
            renderDocuments();
            // Scroll to top smoothly
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Render documents
        function renderDocuments() {
            const currentDocs = getCurrentPageDocuments();
            const filteredDocs = getFilteredDocuments();
            const container = document.getElementById('documentsContainer');
            const noResults = document.getElementById('noResults');
            const docCount = document.getElementById('docCount');
            
            docCount.textContent = filteredDocs.length;
            
            if (filteredDocs.length === 0) {
                container.innerHTML = '';
                container.classList.add('hidden');
                noResults.classList.remove('hidden');
                document.getElementById('paginationContainer').classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            noResults.classList.add('hidden');
            
            if (currentView === 'grid') {
                container.className = 'p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4';
            } else {
                container.className = 'p-4 space-y-3';
            }
            
            if (currentDocs.length === 0 && currentPage > 1) {
                currentPage = 1;
                renderDocuments();
                return;
            }
            
            container.innerHTML = currentDocs.map(doc => {
                if (currentView === 'grid') {
                    return `
                        <div class="doc-card bg-white rounded-xl overflow-hidden shadow-sm cursor-pointer" onclick="openDocument('${doc.id}')">
                            <div class="thumbnail-container h-48">
                                ${doc.thumbnail ? 
                                    `<img src="${doc.thumbnail}" alt="${doc.title}" class="thumbnail-image w-full h-full object-cover" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'w-full h-full bg-gradient-to-br from-red-100 to-red-200 flex items-center justify-center\'><i class=\'fas fa-file-alt text-5xl text-red-400\'></i></div>'">` : 
                                    `<div class="w-full h-full bg-gradient-to-br from-red-100 to-red-200 flex items-center justify-center">
                                        <i class="fas fa-file-alt text-5xl text-red-400"></i>
                                    </div>`}
                            </div>
                            <div class="p-4">
                                <h3 class="font-semibold text-gray-800 mb-2 line-clamp-2">${doc.title}</h3>
                                <p class="text-gray-600 text-sm mb-3 line-clamp-2">${doc.description}</p>
                                <div class="flex flex-wrap gap-2 mb-3">
                                    <span class="inline-flex items-center px-2 py-1 rounded-lg text-xs font-medium bg-red-50 text-red-700">
                                        <i class="fas fa-tag mr-1 text-xs"></i>${doc.category}
                                    </span>
                                    ${doc.subcategory ? `
                                        <span class="inline-flex items-center px-2 py-1 rounded-lg text-xs font-medium bg-gray-50 text-gray-600">
                                            <i class="fas fa-folder mr-1 text-xs"></i>${doc.subcategory}
                                        </span>
                                    ` : ''}
                                </div>
                                <div class="flex items-center justify-between text-red-600 text-sm font-medium">
                                    <span>Xem ngay</span>
                                    <i class="fas fa-arrow-right"></i>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="doc-card bg-white rounded-xl p-3 shadow-sm cursor-pointer flex gap-3" onclick="openDocument('${doc.id}')">
                            <div class="thumbnail-container w-20 h-20 rounded-lg flex-shrink-0">
                                ${doc.thumbnail ? 
                                    `<img src="${doc.thumbnail}" alt="${doc.title}" class="thumbnail-image w-full h-full object-cover rounded-lg" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'w-full h-full bg-gradient-to-br from-red-100 to-red-200 rounded-lg flex items-center justify-center\'><i class=\'fas fa-file-alt text-2xl text-red-400\'></i></div>'">` : 
                                    `<div class="w-full h-full bg-gradient-to-br from-red-100 to-red-200 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-file-alt text-2xl text-red-400"></i>
                                    </div>`}
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-semibold text-gray-800 mb-1 line-clamp-2">${doc.title}</h3>
                                <p class="text-gray-600 text-xs mb-2 line-clamp-2">${doc.description}</p>
                                <div class="flex gap-2">
                                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-50 text-red-700">
                                        ${doc.category}
                                    </span>
                                    ${doc.subcategory ? `
                                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-50 text-gray-600">
                                            ${doc.subcategory}
                                        </span>
                                    ` : ''}
                                </div>
                            </div>
                            <i class="fas fa-chevron-right text-gray-400 self-center"></i>
                        </div>
                    `;
                }
            }).join('');
            
            renderPagination();
        }
        
        // Open document
        function openDocument(docId) {
            const doc = documents.find(d => d.id === docId);
            if (doc && doc.url) {
                window.location.href = doc.url;
            }
        }
        
        // Mobile bottom sheet handlers
        const bottomSheet = document.getElementById('bottomSheet');
        const overlay = document.getElementById('bottomSheetOverlay');
        const mobileFilterBtn = document.getElementById('mobileFilterBtn');
        
        function openBottomSheet() {
            bottomSheet.classList.add('open');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
            
            // Sync mobile filters with current values
            document.getElementById('mobileCategoryFilter').value = currentCategory;
            updateSubcategories(currentCategory, true);
            document.getElementById('mobileSubcategoryFilter').value = currentSubcategory;
        }
        
        function closeBottomSheet() {
            bottomSheet.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }
        
        if (mobileFilterBtn) {
            mobileFilterBtn.addEventListener('click', openBottomSheet);
        }
        
        document.getElementById('closeBottomSheet').addEventListener('click', closeBottomSheet);
        overlay.addEventListener('click', closeBottomSheet);
        
        document.getElementById('applyFilters').addEventListener('click', () => {
            currentCategory = document.getElementById('mobileCategoryFilter').value;
            currentSubcategory = document.getElementById('mobileSubcategoryFilter').value;
            currentPage = 1;
            updateActiveCategory();
            renderDocuments();
            closeBottomSheet();
        });
        
        document.getElementById('clearFiltersMobile').addEventListener('click', () => {
            currentCategory = 'all';
            currentSubcategory = 'all';
            currentPage = 1;
            document.getElementById('mobileCategoryFilter').value = 'all';
            updateSubcategories('all', true);
            document.getElementById('mobileSubcategoryFilter').value = 'all';
            updateActiveCategory();
            renderDocuments();
            closeBottomSheet();
        });
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            renderDocuments();
        });
        
        // View toggle
        document.getElementById('gridView').addEventListener('click', () => {
            currentView = 'grid';
            document.getElementById('gridView').className = 'px-3 py-1.5 rounded-md bg-red-600 text-white transition-all';
            document.getElementById('listView').className = 'px-3 py-1.5 rounded-md bg-gray-100 text-gray-600 transition-all';
            renderDocuments();
        });
        
        document.getElementById('listView').addEventListener('click', () => {
            currentView = 'list';
            document.getElementById('listView').className = 'px-3 py-1.5 rounded-md bg-red-600 text-white transition-all';
            document.getElementById('gridView').className = 'px-3 py-1.5 rounded-md bg-gray-100 text-gray-600 transition-all';
            renderDocuments();
        });
        
        // Pagination buttons
        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderDocuments();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
        
        document.getElementById('nextPage').addEventListener('click', () => {
            const totalPages = Math.ceil(getFilteredDocuments().length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderDocuments();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
        
        // Initialize
        updateActiveCategory();
        loadDocuments();
    </script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body>
</html>
